# ============================================================================
# NeuroSphere — Logstash Pipeline Configuration
# Comprehensive Log Processing for Medical Robotics Platform
#
# This pipeline handles:
#   - Filebeat input (Docker container logs)
#   - Direct TCP JSON input (application log shipping)
#   - HTTP webhook input (external integrations / alerting systems)
#
# Outputs to Elasticsearch with per-service index patterns:
#   neurosphere-{service_name}-YYYY.MM.dd
#
# Compliance: HIPAA-ready field tagging, PHI identification markers
# ============================================================================


# ============================================================================
# INPUT — Multi-protocol log ingestion
# ============================================================================
input {

  # -------------------------------------------------------------------------
  # Beats Input — Primary input for Filebeat container log collection
  # -------------------------------------------------------------------------
  beats {
    port => 5044
    type => "beats"
    tags => ["filebeat", "container-logs"]
  }

  # -------------------------------------------------------------------------
  # TCP Input — Direct JSON log shipping from NeuroSphere services
  # Services can ship structured logs via TCP for low-latency ingestion
  # -------------------------------------------------------------------------
  tcp {
    port => 5000
    codec => json {
      charset => "UTF-8"
    }
    type => "direct"
    tags => ["tcp-input", "json-direct"]
  }

  # -------------------------------------------------------------------------
  # HTTP Input — Webhook receiver for external system integrations
  # Used by: EHR systems, alerting webhooks, compliance audit triggers
  # -------------------------------------------------------------------------
  http {
    port => 8080
    type => "webhook"
    tags => ["http-input", "webhook"]
    codec => json
    response_headers => {
      "Content-Type" => "application/json"
      "X-NeuroSphere-Pipeline" => "logstash"
    }
  }
}


# ============================================================================
# FILTER — Multi-stage log parsing and enrichment
# ============================================================================
filter {

  # =========================================================================
  # STAGE 1: JSON Parsing — Extract structured fields from log messages
  # =========================================================================
  if [message] and [message] =~ /^\{/ {
    json {
      source => "message"
      target => "parsed"
      skip_on_invalid_json => true
      tag_on_failure => ["_jsonparse_failure"]
    }

    # Promote parsed fields to top level if JSON parse succeeded
    if "_jsonparse_failure" not in [tags] and [parsed] {
      ruby {
        code => '
          parsed = event.get("parsed")
          if parsed.is_a?(Hash)
            parsed.each { |k, v| event.set(k, v) unless event.get(k) }
          end
        '
      }
      mutate {
        remove_field => ["parsed"]
      }
    }
  }

  # =========================================================================
  # STAGE 2: Environment Metadata — Tag every event with cluster context
  # =========================================================================
  mutate {
    add_field => {
      "[@metadata][pipeline]" => "neurosphere-main"
      "@environment" => "${NEUROSPHERE_ENV:development}"
      "@cluster" => "${NEUROSPHERE_CLUSTER:neurosphere-dev-01}"
      "@platform" => "neurosphere-medical-robotics"
    }
  }

  # =========================================================================
  # STAGE 3: Service Identification — Determine source service
  # =========================================================================
  if [container][labels][com_neurosphere_service] {
    mutate {
      add_field => {
        "service_name" => "%{[container][labels][com_neurosphere_service]}"
      }
    }
  } else if [service_name] {
    # Already has service_name from structured log
  } else if [docker][container][name] {
    # Extract from Docker container name (neurosphere-{service})
    grok {
      match => {
        "[docker][container][name]" => "neurosphere-(?<service_name>[a-z\-]+)"
      }
      tag_on_failure => ["_service_id_failure"]
    }
  } else {
    mutate {
      add_field => { "service_name" => "unknown" }
    }
  }

  # =========================================================================
  # STAGE 4: Log Format Parsing — Grok patterns for different log formats
  # =========================================================================

  # -------------------------------------------------------------------------
  # 4a. Nginx Access Logs (neurosphere-gateway)
  # Format: $remote_addr - $remote_user [$time_local] "$request" $status
  #         $body_bytes_sent "$http_referer" "$http_user_agent"
  #         rt=$request_time uct=$upstream_connect_time
  #         uht=$upstream_header_time urt=$upstream_response_time
  # -------------------------------------------------------------------------
  if [service_name] == "api-gateway" or [service_name] == "gateway" {
    grok {
      match => {
        "message" => [
          # Extended Nginx log with upstream timing
          "%{IPORHOST:client_ip} - %{DATA:user_name} \[%{HTTPDATE:access_time}\] \"%{WORD:http_method} %{URIPATHPARAM:request_uri} HTTP/%{NUMBER:http_version}\" %{NUMBER:status_code:int} %{NUMBER:body_bytes:int} \"%{DATA:referrer}\" \"%{DATA:user_agent}\" rt=%{NUMBER:request_time:float} uct=%{NUMBER:upstream_connect_time:float} uht=%{NUMBER:upstream_header_time:float} urt=%{NUMBER:upstream_response_time:float}",
          # Standard Nginx combined log
          "%{IPORHOST:client_ip} - %{DATA:user_name} \[%{HTTPDATE:access_time}\] \"%{WORD:http_method} %{URIPATHPARAM:request_uri} HTTP/%{NUMBER:http_version}\" %{NUMBER:status_code:int} %{NUMBER:body_bytes:int} \"%{DATA:referrer}\" \"%{DATA:user_agent}\"",
          # Nginx error log
          "%{DATA:nginx_timestamp} \[%{LOGLEVEL:log_level}\] %{GREEDYDATA:error_message}"
        ]
      }
      tag_on_failure => ["_grok_nginx_failure"]
    }

    # Extract upstream service from request URI
    if [request_uri] {
      grok {
        match => {
          "request_uri" => "/api/v1/(?<upstream_service>[a-z\-]+)"
        }
        tag_on_failure => ["_grok_upstream_failure"]
      }
    }

    mutate {
      rename => {
        "request_time" => "[gateway][response_time]"
        "upstream_response_time" => "[gateway][upstream_response_time]"
        "upstream_connect_time" => "[gateway][upstream_connect_time]"
        "status_code" => "[http][response][status_code]"
        "http_method" => "[http][request][method]"
        "body_bytes" => "[http][response][body][bytes]"
        "upstream_service" => "[gateway][upstream_service]"
      }
    }
  }

  # -------------------------------------------------------------------------
  # 4b. Gunicorn / Python Flask Logs (robot-command, patient-monitor, telemetry)
  # Format: [%(asctime)s] [%(process)d] [%(levelname)s] %(message)s
  # -------------------------------------------------------------------------
  if [service_name] in ["robot-command", "patient-monitor", "telemetry-ingest"] {
    grok {
      match => {
        "message" => [
          # Gunicorn access log
          "\[%{TIMESTAMP_ISO8601:gunicorn_timestamp}\] \[%{NUMBER:pid:int}\] \[%{LOGLEVEL:log_level}\] %{GREEDYDATA:log_message}",
          # Gunicorn worker log
          "%{TIMESTAMP_ISO8601:gunicorn_timestamp} %{LOGLEVEL:log_level} %{GREEDYDATA:log_message}",
          # Flask structured log (JSON already parsed above)
          "%{GREEDYDATA:log_message}"
        ]
      }
      tag_on_failure => ["_grok_gunicorn_failure"]
    }
  }

  # -------------------------------------------------------------------------
  # 4c. Node.js Winston Logs (diagnostic-engine)
  # Format: {"level":"info","message":"...","timestamp":"...","service":"..."}
  # -------------------------------------------------------------------------
  if [service_name] == "diagnostic-engine" {
    if [level] {
      mutate {
        rename => { "level" => "log_level" }
      }
    }

    # Parse Winston-specific fields
    grok {
      match => {
        "message" => [
          # Winston default format
          "%{TIMESTAMP_ISO8601:winston_timestamp} \[%{WORD:log_level}\]: %{GREEDYDATA:log_message}",
          "%{GREEDYDATA:log_message}"
        ]
      }
      tag_on_failure => ["_grok_winston_failure"]
      overwrite => ["log_message"]
    }
  }

  # =========================================================================
  # STAGE 5: Service-Specific Field Extraction
  # =========================================================================

  # -------------------------------------------------------------------------
  # 5a. Robot Command Service
  # Extract: robot_id, command_type, latency, safety_state, procedure_id
  # -------------------------------------------------------------------------
  if [service_name] == "robot-command" {
    if [robot_id] {
      mutate {
        rename => {
          "robot_id" => "[robot][id]"
          "command_type" => "[robot][command][type]"
          "latency" => "[robot][command][latency_ms]"
        }
        add_field => {
          "[robot][platform]" => "neurosphere"
        }
      }
    }

    # Extract from unstructured log messages
    grok {
      match => {
        "log_message" => [
          "robot[_\.]id[=: ]+(?<[robot][id]>[A-Z0-9\-]+).*command[=: ]+(?<[robot][command][type]>\w+).*latency[=: ]+(?<[robot][command][latency_ms]>[\d.]+)",
          "Robot %{DATA:[robot][id]} executed %{WORD:[robot][command][type]} in %{NUMBER:[robot][command][latency_ms]:float}ms"
        ]
      }
      tag_on_failure => []
    }

    if [safety_state] {
      mutate {
        rename => { "safety_state" => "[robot][safety][state]" }
      }
    }

    if [procedure_id] {
      mutate {
        rename => { "procedure_id" => "[medical][procedure][id]" }
      }
    }

    mutate {
      add_tag => ["surgical-robotics", "iec-62443"]
    }
  }

  # -------------------------------------------------------------------------
  # 5b. Patient Monitor Service
  # Extract: patient_id, ward, alert_severity, vital_type, vital_value
  # -------------------------------------------------------------------------
  if [service_name] == "patient-monitor" {
    if [patient_id] {
      mutate {
        rename => {
          "patient_id" => "[patient][id]"
          "ward" => "[patient][ward]"
          "alert_severity" => "[alert][severity]"
        }
      }
    }

    # Extract vital signs data
    if [vital_type] {
      mutate {
        rename => {
          "vital_type" => "[patient][vitals][type]"
          "vital_value" => "[patient][vitals][value]"
          "vital_unit" => "[patient][vitals][unit]"
        }
      }
    }

    # Extract from unstructured messages
    grok {
      match => {
        "log_message" => [
          "patient[_\.]id[=: ]+(?<[patient][id]>[A-Z0-9\-]+).*ward[=: ]+(?<[patient][ward]>\w+).*severity[=: ]+(?<[alert][severity]>\w+)",
          "Patient %{DATA:[patient][id]} alert: %{WORD:[alert][severity]} in ward %{WORD:[patient][ward]}"
        ]
      }
      tag_on_failure => []
    }

    mutate {
      add_tag => ["patient-monitoring", "hipaa-phi"]
    }
  }

  # -------------------------------------------------------------------------
  # 5c. Diagnostic Engine Service
  # Extract: job_id, scan_type, processing_time, model_confidence
  # -------------------------------------------------------------------------
  if [service_name] == "diagnostic-engine" {
    if [job_id] {
      mutate {
        rename => {
          "job_id" => "[diagnostic][job][id]"
          "scan_type" => "[diagnostic][scan][type]"
          "processing_time" => "[diagnostic][processing][time_ms]"
        }
      }
    }

    if [model_confidence] {
      mutate {
        rename => {
          "model_confidence" => "[diagnostic][model][confidence]"
          "model_name" => "[diagnostic][model][name]"
        }
      }
    }

    # Extract from unstructured messages
    grok {
      match => {
        "log_message" => [
          "job[_\.]id[=: ]+(?<[diagnostic][job][id]>[a-f0-9\-]+).*scan[_\.]type[=: ]+(?<[diagnostic][scan][type]>\w+).*processing[_\.]time[=: ]+(?<[diagnostic][processing][time_ms]>[\d.]+)",
          "Diagnostic job %{DATA:[diagnostic][job][id]}: %{WORD:[diagnostic][scan][type]} completed in %{NUMBER:[diagnostic][processing][time_ms]:float}ms"
        ]
      }
      tag_on_failure => []
    }

    mutate {
      add_tag => ["diagnostics", "fda-samd"]
    }
  }

  # -------------------------------------------------------------------------
  # 5d. Telemetry Ingest Service
  # Extract: source_id, event_type, sensor_data, batch_size
  # -------------------------------------------------------------------------
  if [service_name] == "telemetry-ingest" {
    if [source_id] {
      mutate {
        rename => {
          "source_id" => "[telemetry][source][id]"
          "event_type" => "[telemetry][event][type]"
        }
      }
    }

    if [batch_size] {
      mutate {
        rename => {
          "batch_size" => "[telemetry][batch][size]"
          "ingest_latency" => "[telemetry][ingest][latency_ms]"
        }
      }
    }

    # Extract from unstructured messages
    grok {
      match => {
        "log_message" => [
          "source[=: ]+(?<[telemetry][source][id]>[A-Z0-9\-]+).*event[=: ]+(?<[telemetry][event][type]>\w+)",
          "Ingested %{NUMBER:[telemetry][batch][size]:int} events from %{DATA:[telemetry][source][id]}"
        ]
      }
      tag_on_failure => []
    }

    mutate {
      add_tag => ["telemetry", "sensor-data"]
    }
  }

  # =========================================================================
  # STAGE 6: ECS Field Mapping — Normalize to Elastic Common Schema
  # =========================================================================
  mutate {
    rename => {
      "client_ip" => "[source][ip]"
      "user_agent" => "[user_agent][original]"
      "user_name" => "[user][name]"
      "referrer" => "[http][request][referrer]"
      "request_uri" => "[url][path]"
      "http_version" => "[http][version]"
      "pid" => "[process][pid]"
    }
    # Normalize log level to lowercase
    lowercase => ["log_level"]
  }

  # Map log_level to ECS severity
  if [log_level] {
    translate {
      field => "log_level"
      destination => "[log][syslog][severity][name]"
      dictionary => {
        "debug"    => "Debug"
        "info"     => "Informational"
        "notice"   => "Notice"
        "warn"     => "Warning"
        "warning"  => "Warning"
        "error"    => "Error"
        "err"      => "Error"
        "critical" => "Critical"
        "fatal"    => "Emergency"
        "emerg"    => "Emergency"
      }
      fallback => "Informational"
    }
  }

  # =========================================================================
  # STAGE 7: Timestamp Parsing — Normalize all timestamps to UTC
  # =========================================================================
  if [timestamp] {
    date {
      match => [
        "timestamp",
        "ISO8601",
        "yyyy-MM-dd HH:mm:ss.SSS",
        "yyyy-MM-dd'T'HH:mm:ss.SSSZ",
        "yyyy-MM-dd HH:mm:ss,SSS",
        "dd/MMM/yyyy:HH:mm:ss Z"
      ]
      target => "@timestamp"
      timezone => "UTC"
      tag_on_failure => ["_dateparsefailure"]
    }
  } else if [gunicorn_timestamp] {
    date {
      match => ["gunicorn_timestamp", "ISO8601", "yyyy-MM-dd HH:mm:ss,SSS"]
      target => "@timestamp"
      timezone => "UTC"
    }
  } else if [winston_timestamp] {
    date {
      match => ["winston_timestamp", "ISO8601"]
      target => "@timestamp"
      timezone => "UTC"
    }
  } else if [access_time] {
    date {
      match => ["access_time", "dd/MMM/yyyy:HH:mm:ss Z"]
      target => "@timestamp"
    }
  }

  # =========================================================================
  # STAGE 8: GeoIP — Resolve client IP geolocation (for gateway logs)
  # =========================================================================
  if [source][ip] and [source][ip] !~ /^(10\.|172\.(1[6-9]|2[0-9]|3[01])\.|192\.168\.|127\.)/ {
    geoip {
      source => "[source][ip]"
      target => "[source][geo]"
      database => "/usr/share/logstash/vendor/GeoLite2-City.mmdb"
      tag_on_failure => ["_geoip_lookup_failure"]
    }

    geoip {
      source => "[source][ip]"
      target => "[source][as]"
      database => "/usr/share/logstash/vendor/GeoLite2-ASN.mmdb"
      default_database_type => "ASN"
      tag_on_failure => ["_geoip_asn_failure"]
    }
  }

  # =========================================================================
  # STAGE 9: Healthcare Compliance Tagging
  # =========================================================================

  # Tag events that may contain Protected Health Information (PHI)
  if [patient][id] or [message] =~ /patient[_\-]?id/i {
    mutate {
      add_tag => ["contains-phi", "hipaa-regulated"]
      add_field => {
        "[compliance][hipaa][phi_present]" => true
        "[compliance][hipaa][requires_encryption]" => true
      }
    }
  }

  # Tag events related to medical device operations (FDA/IEC compliance)
  if [robot][id] or [message] =~ /robot[_\-]?id/i {
    mutate {
      add_tag => ["medical-device-log", "iec-62443-regulated"]
      add_field => {
        "[compliance][iec62443][device_log]" => true
      }
    }
  }

  # Tag diagnostic events (FDA SaMD compliance)
  if [diagnostic][job][id] {
    mutate {
      add_tag => ["fda-samd-audit"]
      add_field => {
        "[compliance][fda][samd_event]" => true
        "[compliance][fda][requires_audit_trail]" => true
      }
    }
  }

  # Tag high-severity alerts
  if [alert][severity] and [alert][severity] in ["critical", "emergency", "fatal"] {
    mutate {
      add_tag => ["high-severity-alert", "requires-immediate-review"]
    }
  }

  # =========================================================================
  # STAGE 10: Fingerprint — Deduplication hash
  # =========================================================================
  fingerprint {
    source => ["message", "@timestamp", "service_name"]
    target => "[@metadata][fingerprint]"
    method => "SHA256"
    concatenate_sources => true
  }

  # =========================================================================
  # STAGE 11: Cleanup — Remove transient/internal fields
  # =========================================================================
  mutate {
    remove_field => [
      "gunicorn_timestamp",
      "winston_timestamp",
      "access_time",
      "nginx_timestamp",
      "[beat][hostname]",
      "[beat][version]"
    ]
  }
}


# ============================================================================
# OUTPUT — Route processed logs to destinations
# ============================================================================
output {

  # -------------------------------------------------------------------------
  # Elasticsearch — Primary log store with per-service index routing
  # Index pattern: neurosphere-{service_name}-YYYY.MM.dd
  # Deduplication via fingerprint document ID
  # -------------------------------------------------------------------------
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "neurosphere-%{[service_name]}-%{+YYYY.MM.dd}"
    document_id => "%{[@metadata][fingerprint]}"
    # ILM policy for automatic index lifecycle management
    ilm_enabled => true
    ilm_rollover_alias => "neurosphere-logs"
    ilm_pattern => "{now/d}-000001"
    ilm_policy => "neurosphere-log-policy"

    # Template for NeuroSphere indices
    template_name => "neurosphere-logs"
    template_overwrite => true

    # Retry on failure
    retry_on_conflict => 3

    # Connection tuning
    timeout => 30
  }

  # -------------------------------------------------------------------------
  # Stdout — Debug output (conditional on LOG_LEVEL environment variable)
  # Set LOG_LEVEL=debug in docker-compose to enable
  # -------------------------------------------------------------------------
  if "${LOG_LEVEL:info}" == "debug" {
    stdout {
      codec => rubydebug {
        metadata => true
      }
    }
  }
}
