# =============================================================================
# NeuroSphere Medical Robotics — Vault Service Account & RBAC
# =============================================================================
# Vault requires a Kubernetes ServiceAccount with TokenReview permissions
# to validate service account tokens presented by pods authenticating via
# the Kubernetes auth method.
#
# The ClusterRoleBinding grants system:auth-delegator, which provides:
#   - tokenreviews.authentication.k8s.io (create) — validate JWT tokens
#   - subjectaccessreviews.authorization.k8s.io (create) — check permissions
#
# SECURITY NOTE: This is a cluster-wide binding. In multi-tenant clusters,
# consider namespace-scoped alternatives or dedicated auth clusters.
# =============================================================================

# -----------------------------------------------------------------------------
# Namespace
# -----------------------------------------------------------------------------
apiVersion: v1
kind: Namespace
metadata:
  name: neurosphere-vault
  labels:
    app: vault
    part-of: neurosphere
    compliance: hipaa
  annotations:
    description: "NeuroSphere Vault — centralized secrets management"
    # Pod Security Standards: restricted baseline for Vault namespace
    pod-security.kubernetes.io/enforce: "restricted"
    pod-security.kubernetes.io/audit: "restricted"
    pod-security.kubernetes.io/warn: "restricted"

---
# -----------------------------------------------------------------------------
# Service Account
# -----------------------------------------------------------------------------
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault
  namespace: neurosphere-vault
  labels:
    app: vault
    component: secrets-management
    part-of: neurosphere
  annotations:
    description: "Vault server service account — used for K8s auth token review"

---
# -----------------------------------------------------------------------------
# ClusterRoleBinding — Token Review Delegation
# -----------------------------------------------------------------------------
# Binds the Vault service account to system:auth-delegator ClusterRole.
# This allows Vault to call the TokenReview API to validate JWTs presented
# by pods during Kubernetes authentication.
#
# The TokenReview API is called for every Kubernetes auth login:
#   1. Pod presents its service account JWT to Vault
#   2. Vault calls TokenReview API to validate the JWT
#   3. If valid, Vault returns a Vault token with appropriate policies
#
# HIPAA §164.312(d): Person or Entity Authentication — ensures that
# each service is properly authenticated before receiving secrets.
# -----------------------------------------------------------------------------
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vault-token-review
  labels:
    app: vault
    component: secrets-management
    part-of: neurosphere
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:auth-delegator
subjects:
  - kind: ServiceAccount
    name: vault
    namespace: neurosphere-vault

---
# -----------------------------------------------------------------------------
# ClusterRoleBinding — Secret Access for Vault
# -----------------------------------------------------------------------------
# Additional RBAC for Vault to read service account metadata during
# Kubernetes auth. This allows Vault to extract service account annotations
# and labels for policy assignment.
# -----------------------------------------------------------------------------
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: vault-service-account-reader
  labels:
    app: vault
    part-of: neurosphere
rules:
  - apiGroups: [""]
    resources: ["serviceaccounts"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["serviceaccounts/token"]
    verbs: ["create"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vault-service-account-reader-binding
  labels:
    app: vault
    part-of: neurosphere
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: vault-service-account-reader
subjects:
  - kind: ServiceAccount
    name: vault
    namespace: neurosphere-vault
