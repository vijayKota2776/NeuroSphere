# =============================================================================
# NeuroSphere Medical Robotics — Bandit SAST Configuration
# =============================================================================
# Purpose:  Static analysis security testing for all Python microservices
# Scope:    All Python source under services/, infrastructure/, tools/
# Standard: Aligned with IEC 62443-4-1 (Secure Development Lifecycle)
#           and FDA Guidance on Cybersecurity in Medical Devices
# Usage:    bandit -c security/scanning/.bandit.yml -r services/
# =============================================================================

# ---------------------------------------------------------------------------
# Skipped Tests
# ---------------------------------------------------------------------------
# Each skip MUST be justified. Unjustified skips will be flagged in audit.
skips:
  # B101 — Use of assert
  # Rationale: assert statements are used extensively in unit and integration
  # tests. Production code is validated separately via code review checklist
  # item SEC-PY-003 which prohibits assert for input validation.
  - B101

  # B601 — Paramiko call with policy argument
  # Rationale: NeuroSphere does not use Paramiko for SSH. All remote
  # operations use Kubernetes exec API or Vault SSH certificate signing.
  # This check produces noise on unrelated subprocess calls.
  - B601

  # B104 — Binding to all interfaces (0.0.0.0)
  # Rationale: Container services intentionally bind to 0.0.0.0 inside the
  # pod network. Network isolation is enforced by Kubernetes NetworkPolicy
  # and Istio authorization policies, not at the application bind level.
  # Suppressed here; verified by infrastructure security scan instead.
  - B104

# ---------------------------------------------------------------------------
# Excluded Directories
# ---------------------------------------------------------------------------
# These directories are excluded from scanning to reduce noise and runtime.
exclude_dirs:
  - tests              # Test code — assertions and mocks are expected
  - .venv              # Virtual environment — third-party code
  - node_modules       # Node.js dependencies — not Python
  - __pycache__        # Compiled bytecode
  - .git               # Version control
  - migrations         # Database migrations — auto-generated
  - docs               # Documentation
  - .mypy_cache        # Type checker cache
  - .pytest_cache      # Test runner cache

# ---------------------------------------------------------------------------
# Output Configuration
# ---------------------------------------------------------------------------
# Aggregate results per file for cleaner CI output
aggregate: file

# Show top N issues per file (0 = unlimited)
number: 3

# ---------------------------------------------------------------------------
# Severity & Confidence Thresholds
# ---------------------------------------------------------------------------
# Findings below these thresholds are suppressed from output.
# Scale: 1 = LOW, 2 = MEDIUM, 3 = HIGH
#
# For medical device software (IEC 62443-4-1 SL 2), we require at minimum
# MEDIUM severity AND MEDIUM confidence to flag.
confidence: 2   # MEDIUM — suppress LOW confidence findings (likely false positives)
severity: 2     # MEDIUM — suppress LOW severity findings (informational)

