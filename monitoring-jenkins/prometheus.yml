global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'robot-command'
    metrics_path: /metrics
    static_configs:
      - targets: ['neurosphere-robot-command:5000']
    scrape_interval: 10s

  - job_name: 'patient-monitor'
    metrics_path: /metrics
    static_configs:
      - targets: ['neurosphere-patient-monitor:5001']
    scrape_interval: 10s

  - job_name: 'diagnostic-engine'
    metrics_path: /metrics
    static_configs:
      - targets: ['neurosphere-diagnostic-engine:3000']
    scrape_interval: 15s

  - job_name: 'telemetry-ingest'
    metrics_path: /metrics
    static_configs:
      - targets: ['neurosphere-telemetry-ingest:5002']
    scrape_interval: 10s
