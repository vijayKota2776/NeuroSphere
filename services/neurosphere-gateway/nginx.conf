# ============================================================================
# NeuroSphere API Gateway — Nginx Configuration
# Global Autonomous Medical Robotics Operations Platform
#
# Routes all client traffic to internal microservices. Provides:
#   - Rate limiting (10 req/s per client IP)
#   - CORS headers for cross-origin dashboard access
#   - JSON-formatted access logs for HIPAA/compliance audit trail
#   - X-Request-ID propagation for distributed tracing
#   - Custom error pages with healthcare-appropriate messaging
#   - Upstream health checks
# ============================================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/json;

    # ------------------------------------------------------------------
    # JSON Access Log — compliance audit trail (HIPAA / IEC 62443)
    # ------------------------------------------------------------------
    log_format json_audit escape=json
        '{'
            '"timestamp":"$time_iso8601",'
            '"request_id":"$request_id",'
            '"remote_addr":"$remote_addr",'
            '"request_method":"$request_method",'
            '"request_uri":"$request_uri",'
            '"status":$status,'
            '"body_bytes_sent":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_addr":"$upstream_addr",'
            '"upstream_response_time":"$upstream_response_time",'
            '"http_user_agent":"$http_user_agent",'
            '"http_referer":"$http_referer",'
            '"http_x_forwarded_for":"$http_x_forwarded_for"'
        '}';

    access_log /var/log/nginx/access.log json_audit;

    # ------------------------------------------------------------------
    # Rate Limiting — 10 requests/second per client IP
    # Zone: 10 MB shared memory (~160 000 unique IPs)
    # burst=20: allow short spikes; nodelay: don't queue them
    # ------------------------------------------------------------------
    limit_req_zone $binary_remote_addr zone=api_rate_limit:10m rate=10r/s;
    limit_req_status 429;

    # ------------------------------------------------------------------
    # General tuning
    # ------------------------------------------------------------------
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    client_max_body_size 16m;

    # Hide server version in responses
    server_tokens off;

    # ------------------------------------------------------------------
    # Upstream Definitions (with keepalive for connection reuse)
    # ------------------------------------------------------------------
    upstream robot_command {
        server robot-command-service:5000 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    upstream diagnostic_engine {
        server diagnostic-engine-service:3000 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    upstream patient_monitor {
        server patient-monitor-service:5001 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    upstream telemetry_ingest {
        server telemetry-ingest-service:5002 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    # ------------------------------------------------------------------
    # Main Server Block
    # ------------------------------------------------------------------
    server {
        listen 80;
        server_name _;

        # ==============================================================
        # CORS Headers (applied to every proxied response)
        # ==============================================================
        add_header X-Request-ID       $request_id always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options    "DENY" always;
        add_header X-XSS-Protection   "1; mode=block" always;
        add_header Referrer-Policy    "strict-origin-when-cross-origin" always;

        # ----------------------------------------------------------
        # Custom Error Pages — healthcare-appropriate messaging
        # ----------------------------------------------------------
        error_page 429 /429.json;
        location = /429.json {
            internal;
            default_type application/json;
            return 429 '{"error":"rate_limit_exceeded","message":"Request rate limit exceeded. Medical systems enforce strict rate limits for patient safety. Please retry after a brief pause.","code":429}';
        }

        error_page 502 /502.json;
        location = /502.json {
            internal;
            default_type application/json;
            return 502 '{"error":"service_unavailable","message":"The requested medical service is temporarily unreachable. Failover protocols are active. Clinical staff: please use backup communication channels if this persists.","code":502}';
        }

        error_page 503 /503.json;
        location = /503.json {
            internal;
            default_type application/json;
            return 503 '{"error":"service_maintenance","message":"This medical robotics service is undergoing scheduled maintenance. All active surgical procedures have been safely transitioned to manual control. Estimated recovery: <5 minutes.","code":503}';
        }

        error_page 504 /504.json;
        location = /504.json {
            internal;
            default_type application/json;
            return 504 '{"error":"gateway_timeout","message":"The upstream medical service did not respond within the safety timeout window. Automated watchdog has been notified. No patient procedures are affected.","code":504}';
        }

        # ==============================================================
        # Health Check Endpoint (gateway itself)
        # ==============================================================
        location = /health {
            access_log off;
            default_type application/json;
            return 200 '{"status":"healthy","service":"neurosphere-gateway","timestamp":"$time_iso8601"}';
        }

        # ==============================================================
        # Robot Command Service  →  /api/robots/*
        # ==============================================================
        location /api/robots/ {
            limit_req zone=api_rate_limit burst=20 nodelay;

            # CORS preflight
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin'  '*' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Request-ID, X-Surgeon-ID' always;
                add_header 'Access-Control-Max-Age' 3600;
                add_header 'Content-Length' 0;
                return 204;
            }

            add_header 'Access-Control-Allow-Origin'  '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Request-ID, X-Surgeon-ID' always;

            proxy_pass http://robot_command;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID      $request_id;
            proxy_set_header Connection        "";
            proxy_http_version 1.1;

            proxy_connect_timeout 5s;
            proxy_read_timeout    30s;
            proxy_send_timeout    30s;
        }

        # ==============================================================
        # Diagnostic Engine Service  →  /api/diagnostics/*
        # ==============================================================
        location /api/diagnostics/ {
            limit_req zone=api_rate_limit burst=20 nodelay;

            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin'  '*' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Request-ID' always;
                add_header 'Access-Control-Max-Age' 3600;
                add_header 'Content-Length' 0;
                return 204;
            }

            add_header 'Access-Control-Allow-Origin'  '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Request-ID' always;

            proxy_pass http://diagnostic_engine;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID      $request_id;
            proxy_set_header Connection        "";
            proxy_http_version 1.1;

            proxy_connect_timeout 5s;
            proxy_read_timeout    60s;   # diagnostics may take longer
            proxy_send_timeout    30s;
        }

        # ==============================================================
        # Patient Monitor Service  →  /api/patients/*
        # ==============================================================
        location /api/patients/ {
            limit_req zone=api_rate_limit burst=20 nodelay;

            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin'  '*' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Request-ID, X-Clinician-ID' always;
                add_header 'Access-Control-Max-Age' 3600;
                add_header 'Content-Length' 0;
                return 204;
            }

            add_header 'Access-Control-Allow-Origin'  '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Request-ID, X-Clinician-ID' always;

            proxy_pass http://patient_monitor;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID      $request_id;
            proxy_set_header Connection        "";
            proxy_http_version 1.1;

            proxy_connect_timeout 5s;
            proxy_read_timeout    30s;
            proxy_send_timeout    30s;
        }

        # ==============================================================
        # Telemetry Ingest Service  →  /api/telemetry/*
        # ==============================================================
        location /api/telemetry/ {
            limit_req zone=api_rate_limit burst=40 nodelay;  # higher burst for telemetry streams

            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin'  '*' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Request-ID, X-Robot-ID' always;
                add_header 'Access-Control-Max-Age' 3600;
                add_header 'Content-Length' 0;
                return 204;
            }

            add_header 'Access-Control-Allow-Origin'  '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Request-ID, X-Robot-ID' always;

            proxy_pass http://telemetry_ingest;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID      $request_id;
            proxy_set_header Connection        "";
            proxy_http_version 1.1;

            proxy_connect_timeout 5s;
            proxy_read_timeout    15s;   # telemetry should be fast
            proxy_send_timeout    15s;
        }

        # ==============================================================
        # Catch-all — return 404 with helpful message
        # ==============================================================
        location / {
            default_type application/json;
            return 404 '{"error":"not_found","message":"The requested endpoint does not exist on the NeuroSphere Gateway. Available API prefixes: /api/robots, /api/diagnostics, /api/patients, /api/telemetry","code":404}';
        }
    }
}
