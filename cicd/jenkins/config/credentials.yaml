# ===========================================================================
# NeuroSphere — Jenkins Credentials Configuration
#
# Template for Jenkins credential store entries.
# In production, these are injected via environment variables or
# Vault integration — NEVER commit actual secrets.
#
# HIPAA Compliance Note:
#   All credentials must be stored in Jenkins' encrypted credential
#   store or retrieved from HashiCorp Vault at runtime.
#   Plain-text secrets in source control violate HIPAA §164.312(a)(1).
# ===========================================================================

credentials:
  system:
    domainCredentials:
      - credentials:
          # ----------------------------------------------------------------
          # AWS Credentials — ECR, EKS, S3 access
          # ----------------------------------------------------------------
          - usernamePassword:
              scope: GLOBAL
              id: "aws-credentials"
              username: "${AWS_ACCESS_KEY_ID:-PLACEHOLDER}"
              password: "${AWS_SECRET_ACCESS_KEY:-PLACEHOLDER}"
              description: "AWS IAM credentials for NeuroSphere infrastructure"

          # ----------------------------------------------------------------
          # Docker Registry URL
          # ----------------------------------------------------------------
          - string:
              scope: GLOBAL
              id: "docker-registry-url"
              secret: "${DOCKER_REGISTRY:-000000000000.dkr.ecr.us-east-1.amazonaws.com}"
              description: "AWS ECR registry URL for NeuroSphere container images"

          # ----------------------------------------------------------------
          # Kubernetes Kubeconfig
          # ----------------------------------------------------------------
          - file:
              scope: GLOBAL
              id: "kubeconfig-dev"
              fileName: "kubeconfig-dev"
              description: "Kubeconfig for NeuroSphere dev EKS cluster"

          - file:
              scope: GLOBAL
              id: "kubeconfig-staging"
              fileName: "kubeconfig-staging"
              description: "Kubeconfig for NeuroSphere staging EKS cluster"

          - file:
              scope: GLOBAL
              id: "kubeconfig-prod"
              fileName: "kubeconfig-prod"
              description: "Kubeconfig for NeuroSphere production EKS cluster"

          # ----------------------------------------------------------------
          # SonarQube — Code Quality Analysis
          # ----------------------------------------------------------------
          - string:
              scope: GLOBAL
              id: "sonarqube-token"
              secret: "${SONAR_TOKEN:-PLACEHOLDER}"
              description: "SonarQube authentication token for code quality analysis"

          # ----------------------------------------------------------------
          # Slack — CI/CD Notifications
          # ----------------------------------------------------------------
          - string:
              scope: GLOBAL
              id: "slack-webhook-url"
              secret: "${SLACK_WEBHOOK_URL:-PLACEHOLDER}"
              description: "Slack incoming webhook for pipeline notifications"

          # ----------------------------------------------------------------
          # GitHub — Source Code Access
          # ----------------------------------------------------------------
          - usernamePassword:
              scope: GLOBAL
              id: "github-token"
              username: "${GITHUB_USERNAME:-neurosphere-bot}"
              password: "${GITHUB_TOKEN:-PLACEHOLDER}"
              description: "GitHub personal access token for repository access"

          # ----------------------------------------------------------------
          # HashiCorp Vault — Secrets Management
          # ----------------------------------------------------------------
          - string:
              scope: GLOBAL
              id: "vault-token"
              secret: "${VAULT_TOKEN:-PLACEHOLDER}"
              description: "HashiCorp Vault token for runtime secret retrieval"

          - string:
              scope: GLOBAL
              id: "vault-addr"
              secret: "${VAULT_ADDR:-http://vault.neurosphere-vault.svc:8200}"
              description: "HashiCorp Vault server address"
